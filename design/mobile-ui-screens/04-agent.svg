<svg xmlns="http://www.w3.org/2000/svg" width="430" height="900" viewBox="0 0 430 900">
  <title>育儿协作台 - Agent界面</title>
  <desc>Editable modular UI export: assistant identity, segmented control, plan answer card, video/RAG upload card, ingest flow, safety warning, fixed bottom tabs, assistant FAB.</desc>
  <defs>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.10"/>
      </filter>
      <style>
        .bg { fill: #f4f5f7; }
        .phone { fill: #ffffff; stroke: #eceef2; stroke-width: 2; }
        .text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111619; }
        .muted { fill: #7c818a; }
        .hair { stroke: #e6e8ec; stroke-width: 2; }
        .pill { fill: #f6f6f7; }
        .card { fill: #ffffff; stroke: #edf0f3; stroke-width: 2; filter: url(#softShadow); }
        .soft { fill: #f7f7f8; }
        .lav { fill: #eee8ff; }
        .lav2 { fill: #ded2ff; }
        .blue { fill: #edf2ff; }
        .peach { fill: #fff0e9; }
        .mint { fill: #edf8f0; }
        .warn { fill: #fff6dc; }
        .dark { fill: #111619; }
        .line { stroke: #d9dde3; stroke-width: 2; fill: none; }
        .dash { stroke: #e2e4e8; stroke-width: 3; stroke-dasharray: 11 11; fill: none; }
        .nav { fill: #ffffff; filter: url(#softShadow); }
        .selected { fill: #e9e9ea; }
        .assistant { fill: #a98cff; }
        .small { font-size: 21px; }
        .body { font-size: 25px; font-weight: 600; }
        .caption { font-size: 20px; }
        .title { font-size: 54px; font-weight: 700; }
        .section { font-size: 31px; font-weight: 700; }
        .tiny { font-size: 17px; }
      </style>
    </defs>
  <rect width="430" height="900" rx="0" fill="#f4f5f7"/>
  <g id="04-agent-screen" transform="translate(20 28)">
  <rect class="phone" width="390" height="844" rx="48"/>
  <text class="text" x="38" y="58" font-size="24" font-weight="800">22:49</text>
  <text class="text" x="303" y="58" font-size="21" font-weight="700">5G  ◼</text>
  <circle class="assistant" cx="194" cy="120" r="45"/>
  <text class="text" x="174" y="136" font-size="36">◡</text>
  <text class="text section" x="75" y="194">育儿协作 Agent</text>
  <text class="muted small" x="68" y="225">即时问答 · 视频入库 · 任务联动</text>
  <rect class="soft" x="32" y="254" width="326" height="56" rx="28"/>
  <rect class="dark" x="38" y="260" width="154" height="44" rx="22"/>
  <text fill="#fff" x="76" y="290" font-size="20" font-weight="800">即时问答</text>
  <text class="text" x="231" y="290" font-size="20" font-weight="800">视频入库</text>

  <rect class="card" x="32" y="336" width="326" height="126" rx="24"/>
  <text class="muted small" x="56" y="374">今天有什么计划？</text>
  <text class="text body" x="56" y="409">今晚优先完成睡前护理</text>
  <text class="muted tiny" x="56" y="439">依据：宝宝状态 · 视频 02:10 · 爸爸可用</text>
  <rect class="card" x="32" y="488" width="326" height="110" rx="24"/>
  <text class="text body" x="56" y="527">上传护理视频更新 RAG</text>
  <rect class="dash" x="56" y="546" width="252" height="34" rx="12"/>
  <text class="muted small" x="103" y="570">选择视频 / 抖音转写结果 / 本地文件</text>

  <rect class="lav" x="32" y="626" width="326" height="86" rx="24"/>
  <text class="text body" x="56" y="662">入库流程</text>
  <text class="muted small" x="56" y="690">视频 → 转写 → 结构化 → RAG → 待办</text>
  <rect class="warn" x="32" y="730" width="326" height="58" rx="20"/>
  <text class="text small" x="56" y="764">医疗/用药/异常：提示咨询医护，不生成任务</text>

  <g transform="translate(30,765)">
    <rect class="nav" width="292" height="62" rx="31"/>
    <rect class="selected" x="249" y="7" width="43" height="48" rx="24"/>
    <text class="muted" x="36" y="43" font-size="30">✓</text>
    <text class="muted" x="116" y="43" font-size="28">▣</text>
    <text class="muted" x="185" y="43" font-size="28">◌</text>
    <text class="text" x="247" y="43" font-size="28">▥</text>
    <circle fill="#fff" cx="344" cy="31" r="33" filter="url(#softShadow)"/>
    <circle class="assistant" cx="344" cy="31" r="24"/>
    <text class="text" x="333" y="41" font-size="24">◡</text>
  </g>
  </g>
</svg>
